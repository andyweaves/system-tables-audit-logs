bundle:
  name: system-tables-audit-logs
  deployment:
    # Direct engine deploys via the Databricks REST API instead of running
    # a bundled Terraform. Avoids the CLI's Terraform download step, which
    # has hit PGP signature / chmod failures on recent CLI versions. Direct
    # is marked experimental upstream but is the simpler path for pure
    # Alerts v2 bundles like this one. Override with
    # DATABRICKS_BUNDLE_ENGINE=terraform if you need the Terraform engine.
    engine: direct

include:
  - generated/*.yml

variables:
  host:
    description: "Databricks workspace URL (e.g. https://adb-xxx.azuredatabricks.net). Set in .databricks/bundle/<target>/variable-overrides.json (auto-gitignored by DAB). See README.md > Using Databricks Asset Bundles > Copy-and-fill workflow."
  warehouse_id:
    description: "SQL Warehouse ID to run alerts on. Set in .databricks/bundle/<target>/variable-overrides.json (auto-gitignored by DAB)."
  alert_emails:
    description: "Email address (or comma-separated list) for alert notifications. Set in .databricks/bundle/<target>/variable-overrides.json (auto-gitignored by DAB)."
  alert_schedule:
    description: "Quartz cron schedule (6-field format) for alert evaluation"
    default: "1 1 * * * ?"
  alert_timezone:
    description: "Java timezone ID for alert schedule"
    default: "UTC"

experimental:
  scripts:
    preinit: python3 src/generate_alerts.py

targets:
  dev:
    mode: development
    default: true
  prod:
    mode: production
